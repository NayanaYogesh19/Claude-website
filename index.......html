<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My College</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
    background-color: #002147;
    padding: 15px;
    color: white;
    display: flex;
    justify-content: space-between;
}

.navbar a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* Hero Section */
.hero {
    background: linear-gradient(to right, #004080, #00aaff);
    color: white;
    text-align: center;
    padding: 80px 20px;
}

.hero button {
    padding: 10px 20px;
    background: white;
    color: #004080;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* Sections */
.section {
    padding: 40px;
    text-align: center;
}

.courses {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.card {
    background: #f2f2f2;
    padding: 20px;
    width: 200px;
    border-radius: 10px;
}

/* Footer */
.footer {
    background: #002147;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div><b>My College</b></div>
    <div>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Welcome to My College</h1>
    <p>Empowering Students for a Bright Future</p>
    <button onclick="alert('Admissions Open!')">Apply Now</button>
</div>

<!-- About Section -->
<div class="section">
    <h2>About Us</h2>
    <p>Our college provides quality education and great opportunities for students.</p>
</div>

<!-- Courses Section -->
<div class="section">
    <h2>Our Courses</h2>
    <div class="courses">
        <div class="card">BCA</div>
        <div class="card">MCA</div>
        <div class="card">BBA</div>
    </div>
</div>

<!-- Contact Section -->
<div class="section">
    <h2>Contact Us</h2>
    <button onclick="alert('Contact: 1234567890')">Call Now</button>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 My College | All Rights Reserved</p>
</div>

</body>
</html>
