<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My College</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #111;
    color: #fff;
}

/* Navbar */
.navbar {
    background-color: #000;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar a {
    color: #ff8800;
    margin: 0 12px;
    text-decoration: none;
    font-weight: bold;
}

.navbar a:hover {
    color: white;
}

/* Hero Section */
.hero {
    background: linear-gradient(to right, #000, #ff8800);
    text-align: center;
    padding: 90px 20px;
}

.hero h1 {
    font-size: 40px;
}

.hero button {
    padding: 12px 25px;
    background: #ff8800;
    color: black;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
}

.hero button:hover {
    background: white;
}

/* Sections */
.section {
    padding: 50px;
    text-align: center;
}

.section h2 {
    color: #ff8800;
}

/* Courses */
.courses {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: #222;
    padding: 25px;
    width: 220px;
    border-radius: 10px;
    border: 2px solid #ff8800;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #ff8800;
    color: black;
}

/* Buttons */
button {
    padding: 10px 20px;
    background: #ff8800;
    color: black;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
}

button:hover {
    background: white;
}

/* Footer */
.footer {
    background: #000;
    text-align: center;
    padding: 15px;
    color: #ff8800;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div><b>🔥 My College</b></div>
    <div>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Welcome to My College</h1>
    <p>Empowering Students for a Bright Future</p>
    <button onclick="alert('Admissions Open!')">Apply Now</button>
</div>

<!-- About Section -->
<div class="section">
    <h2>About Us</h2>
    <p>We provide high-quality education, industry exposure, and career opportunities for students.</p>
</div>

<!-- Courses Section -->
<div class="section">
    <h2>Our Courses</h2>
    <div class="courses">
        <div class="card">BCA</div>
        <div class="card">MCA</div>
        <div class="card">BBA</div>
    </div>
</div>

<!-- Contact Section -->
<div class="section">
    <h2>Contact Us</h2>
    <button onclick="alert('Contact: 1234567890')">Call Now</button>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 My College | All Rights Reserved</p>
</div>

</body>
</html>
